// Persistance locale (remplace l'API window.storage de Claude.ai par localStorage,
// puisque cette version tourne comme une vraie page web autonome sur le téléphone).
window.storage = {
  async get(key) {
    const v = window.localStorage.getItem(key);
    return v === null ? null : { key, value: v, shared: false };
  },
  async set(key, value) {
    window.localStorage.setItem(key, value);
    return { key, value, shared: false };
  },
  async delete(key) {
    window.localStorage.removeItem(key);
    return { key, deleted: true, shared: false };
  },
  async list(prefix) {
    const keys = Object.keys(window.localStorage).filter((k) => !prefix || k.startsWith(prefix));
    return { keys, shared: false };
  },
};

// Calibré pour qu'un muscle entraîné directement ~2x/semaine atteigne le rang
// Mythique en un minimum d'environ 2 ans d'entraînement dédié.
const RANK_THRESHOLDS = [0, 1418, 6295, 15052, 27939, 45140, 66804, 93055, 124000];
const TIER_NAMES = ["Bronze", "Argent", "Or", "Platine", "Diamant", "Maître", "Grand Maître", "Légende", "Mythique"];
const TIER_COLORS = ["#9A6633", "#B8C0C8", "#E8B923", "#8FE3EA", "#7FCFFF", "#6C8CFF", "#9B6CFF", "#FF6EC7", "#C77DFF"];

// Rang global basé sur le niveau du joueur (même échelle de 9 rangs que les muscles),
// calibré pour atteindre Mythique au niveau 100 (Niveau Ultime).
const LEVEL_RANK_THRESHOLDS = [1, 2, 6, 13, 23, 37, 54, 75, 100];

function getLevelRankTier(level) {
  let idx = 0;
  for (let i = 0; i < LEVEL_RANK_THRESHOLDS.length; i++) {
    if (level >= LEVEL_RANK_THRESHOLDS[i]) idx = i;
    else break;
  }
  return idx;
}

const MAX_LEVEL = 100;

// Courbe calibrée pour qu'un entraînement rigoureux (~5 séances/semaine) atteigne
// le Niveau Ultime (100) en un minimum d'environ 2 ans.
function xpForLevel(level) {
  return Math.round(50 * Math.pow(level, 1.45));
}

function getLevelInfo(totalXp) {
  let level = 1;
  let remaining = totalXp;
  while (level < MAX_LEVEL) {
    const needed = xpForLevel(level);
    if (remaining < needed) break;
    remaining -= needed;
    level += 1;
  }
  const isMax = level >= MAX_LEVEL;
  return { level, xpIntoLevel: remaining, xpForNextLevel: isMax ? null : xpForLevel(level), isMax };
}

function getMuscleRankInfo(xp) {
  let idx = 0;
  for (let i = 0; i < RANK_THRESHOLDS.length; i++) {
    if (xp >= RANK_THRESHOLDS[i]) idx = i;
    else break;
  }
  const tier = idx;
  const isMax = idx === RANK_THRESHOLDS.length - 1;
  const currentThreshold = RANK_THRESHOLDS[idx];
  const nextThreshold = isMax ? null : RANK_THRESHOLDS[idx + 1];
  const progress = isMax ? 1 : (xp - currentThreshold) / (nextThreshold - currentThreshold);
  return { idx, tier, isMax, progress, nextThreshold };
}

function getRankLabel(info) {
  return TIER_NAMES[info.tier];
}

function computeSetXp(type, s) {
  if (type === "weight_reps") return Math.max(1, Math.round(s.weight * s.reps * 0.5));
  if (type === "bodyweight") return Math.max(1, Math.round(s.reps * 3));
  if (type === "duration") return Math.max(1, Math.round(s.seconds / 2));
  if (type === "distance") return Math.max(1, Math.round(s.km * 40));
  if (type === "band") return Math.max(1, Math.round(s.reps * 2.5));
  return 1;
}

function computeSetScore(type, s) {
  if (type === "weight_reps") return s.weight * s.reps;
  if (type === "bodyweight") return s.reps;
  if (type === "duration") return s.seconds;
  if (type === "distance") return s.km;
  if (type === "band") return s.reps;
  return 0;
}

function formatSet(type, s) {
  if (type === "weight_reps") return `${s.weight}kg × ${s.reps}`;
  if (type === "bodyweight" || type === "band") return `${s.reps} reps`;
  if (type === "duration") return `${s.seconds}s`;
  if (type === "distance") return `${s.km}km`;
  return "";
}

// Renvoie la date LOCALE au format YYYY-MM-DD.
// On n'utilise volontairement pas toISOString(), qui convertit en UTC et decale
// la date d'un jour dans tous les fuseaux a l'est de Greenwich.
function localDateKey(d) {
  const date = d || new Date();
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const day = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

// Reconstruit une Date locale a minuit a partir d'une cle YYYY-MM-DD.
// new Date("2026-07-18") serait interprete en UTC : meme famille de bug.
function dateFromKey(key) {
  const p = String(key).split("-");
  return new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));
}

function updateStreak(streak) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const todayStr = localDateKey(today);
  if (streak.lastDate === todayStr) return streak;

  let { current, longest, freezesUsedWeek, weekStart } = streak;

  if (!weekStart || (today - dateFromKey(weekStart)) / (1000 * 60 * 60 * 24) >= 7) {
    weekStart = todayStr;
    freezesUsedWeek = 0;
  }

  if (!streak.lastDate) {
    current = 1;
  } else {
    const last = dateFromKey(streak.lastDate);
    const diffDays = Math.round((today - last) / (1000 * 60 * 60 * 24));
    if (diffDays === 1) {
      current += 1;
    } else if (diffDays === 2 && freezesUsedWeek < 2) {
      current += 1;
      freezesUsedWeek += 1;
    } else {
      current = 1;
    }
  }

  longest = Math.max(longest, current);
  return { current, longest, lastDate: todayStr, freezesUsedWeek, weekStart };
}

function SimpleLineChart({ data, dataKey, xKey, color }) {
  if (!data || data.length === 0) return null;
  const width = 320;
  const height = 170;
  const padTop = 12;
  const padBottom = 22;
  const padSide = 10;
  const values = data.map((d) => d[dataKey]);
  const min = Math.min(...values);
  const max = Math.max(...values);
  const range = max - min || 1;
  const innerW = width - padSide * 2;
  const innerH = height - padTop - padBottom;

  const points = data.map((d, i) => {
    const x = padSide + (data.length === 1 ? innerW / 2 : (i / (data.length - 1)) * innerW);
    const y = padTop + innerH - ((d[dataKey] - min) / range) * innerH;
    return [x, y];
  });
  const pathD = points.map((p, i) => (i === 0 ? "M" : "L") + p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" ");
  const areaD = pathD + ` L${points[points.length - 1][0].toFixed(1)},${(padTop + innerH).toFixed(1)} L${points[0][0].toFixed(1)},${(padTop + innerH).toFixed(1)} Z`;

  const labelStep = Math.max(1, Math.ceil(data.length / 5));

  return (
    <svg viewBox={`0 0 ${width} ${height}`} style={{ width: "100%", height: "auto", display: "block" }}>
      <defs>
        <linearGradient id="chartFade" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.28" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={areaD} fill="url(#chartFade)" stroke="none" />
      <path d={pathD} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
      {points.map((p, i) => (
        <circle key={i} cx={p[0]} cy={p[1]} r="3.2" fill={color} />
      ))}
      {data.map((d, i) =>
        i % labelStep === 0 || i === data.length - 1 ? (
          <text key={i} x={points[i][0]} y={height - 6} fontSize="9" fill="#9AA3B2" textAnchor="middle">
            {d[xKey]}
          </text>
        ) : null
      )}
    </svg>
  );
}

function computeTrend(values) {
  if (!values || values.length < 2) return "stable";
  const last = values[values.length - 1];
  const prevAvg = values.slice(0, -1).reduce((a, b) => a + b, 0) / (values.length - 1);
  if (prevAvg === 0) return last > 0 ? "up" : "stable";
  if (last > prevAvg * 1.03) return "up";
  if (last < prevAvg * 0.97) return "down";
  return "stable";
}

  const Icon = trend === "up" ? ArrowUpRight : trend === "down" ? ArrowDownRight : ArrowRight;

  );
}

function Sparkline({ values }) {
  if (!values || values.length === 0) return <div className="sparkline sparkline-empty" />;
  if (values.length === 1) {
    return (
      <div className="sparkline sparkline-dot-wrap">
        <div className="sparkline-dot" />
      </div>
    );
  }
  const max = Math.max(...values, 1);
  return (
    <div className="sparkline">
      {values.map((v, i) => (
        <div
          key={i}
          className={`sparkline-bar ${i === values.length - 1 ? "sparkline-bar-active" : ""}`}
          style={{ height: `${Math.max(10, (v / max) * 100)}%` }}
        />
      ))}
    </div>
  );
}

function ExerciseSessionCard({ entry, onAddSet, onRemoveSet, onRemoveExercise, target }) {
  const ex = EXERCISES.find((e) => e.id === entry.exerciseId);
  const [form, setForm] = useState({ weight: "", reps: "", seconds: "", km: "" });

  // Garde : un programme enregistre peut referencer un exercice qui n'existe plus.
  // Sans ce test, ex.type plantait le rendu de TOUTE l'application.
  if (!ex) return null;

  function handleAdd() {
    let setData = null;
    if (ex.type === "weight_reps") {
      const weight = parseFloat(form.weight);
      const reps = parseInt(form.reps, 10);
      if (!(weight > 0) || !(reps > 0)) return;
      setData = { weight, reps };
    } else if (ex.type === "bodyweight" || ex.type === "band") {
      const reps = parseInt(form.reps, 10);
      if (!(reps > 0)) return;
      setData = { reps };
    } else if (ex.type === "duration") {
      const seconds = parseInt(form.seconds, 10);
      if (!(seconds > 0)) return;
      setData = { seconds };
    } else if (ex.type === "distance") {
      const km = parseFloat(form.km);
      if (!(km > 0)) return;
      setData = { km };
    }
    onAddSet(entry.exerciseId, setData);
    setForm({ weight: "", reps: "", seconds: "", km: "" });
  }

  return (
    <div className="session-card">
      <div className="session-card-head">
        <div>
          <div className="session-card-name">{ex.name}</div>
          <div className="session-card-muscle">{MUSCLES.find((m) => m.id === ex.muscle)?.label || ""}</div>
          {target && <div className="session-card-target">Objectif : {target}</div>}
        </div>
        <button className="icon-btn" onClick={() => onRemoveExercise(entry.exerciseId)}>
          <X size={16} />
        </button>
      </div>

      {entry.sets.length > 0 && (
        <div className="set-list">
          {entry.sets.map((s, i) => (
            <div key={i} className="set-row" style={{ zIndex: i + 1 }}>
              <span className="set-row-label">
                Série {i + 1} — {formatSet(ex.type, s)}
              </span>
              <span className="set-row-xp">+{computeSetXp(ex.type, s)} XP</span>
              <button className="icon-btn small" onClick={() => onRemoveSet(entry.exerciseId, i)}>
                <X size={12} />
              </button>
            </div>
          ))}
        </div>
      )}

      <div className="set-form">
        {ex.type === "weight_reps" && (
          <>
            <input type="number" placeholder="Poids (kg)" value={form.weight} onChange={(e) => setForm({ ...form, weight: e.target.value })} />
            <input type="number" placeholder="Répétitions" value={form.reps} onChange={(e) => setForm({ ...form, reps: e.target.value })} />
          </>
        )}
        {(ex.type === "bodyweight" || ex.type === "band") && (
          <input type="number" placeholder="Répétitions" value={form.reps} onChange={(e) => setForm({ ...form, reps: e.target.value })} />
        )}
        {ex.type === "duration" && (
          <input type="number" placeholder="Secondes" value={form.seconds} onChange={(e) => setForm({ ...form, seconds: e.target.value })} />
        )}
        {ex.type === "distance" && (
          <input type="number" step="0.1" placeholder="Distance (km)" value={form.km} onChange={(e) => setForm({ ...form, km: e.target.value })} />
        )}
        <button className="btn-add-set" onClick={handleAdd}>
          <Plus size={14} /> Ajouter
        </button>
      </div>
    </div>
  );
}

function formatTargetSets(entry, ex) {
  if (!ex || !entry || !Array.isArray(entry.targetSets) || entry.targetSets.length === 0) return "";
  return entry.targetSets.map((s, i) => `S${i + 1} ${formatSetLoose(ex.type, s)}`).join(" · ");
}

function formatSetLoose(type, s) {
  if (type === "weight_reps") {
    if (s.weight !== undefined && s.reps !== undefined) return `${s.weight}kg×${s.reps}`;
    if (s.reps !== undefined) return `${s.reps} reps`;
    if (s.weight !== undefined) return `${s.weight}kg`;
    return "—";
  }
  if (type === "bodyweight" || type === "band") return s.reps !== undefined ? `${s.reps} reps` : "—";
  if (type === "duration") return s.seconds !== undefined ? `${s.seconds}s` : "—";
  if (type === "distance") return s.km !== undefined ? `${s.km}km` : "—";
  return "—";
}

function isCompleteTargetSet(type, s) {
  if (!s) return false;
  if (type === "weight_reps") return typeof s.weight === "number" && !isNaN(s.weight) && s.weight > 0 && typeof s.reps === "number" && !isNaN(s.reps) && s.reps > 0;
  if (type === "bodyweight" || type === "band") return typeof s.reps === "number" && !isNaN(s.reps) && s.reps > 0;
  if (type === "duration") return typeof s.seconds === "number" && !isNaN(s.seconds) && s.seconds > 0;
  if (type === "distance") return typeof s.km === "number" && !isNaN(s.km) && s.km > 0;
  return false;
}

function normalizeExerciseEntry(entry) {
  if (typeof entry === "string") return { exerciseId: entry, targetSets: [] };
  if (!entry || typeof entry !== "object") return { exerciseId: "", targetSets: [] };
  if (Array.isArray(entry.targetSets)) return { ...entry, targetSets: entry.targetSets };

  // Ancien format agrégé (targetSets était un nombre + targetReps/targetWeight/targetSeconds/targetKm partagés)
  const count = parseInt(entry.targetSets, 10);
  if (count > 0) {
    const singleSet = {};
    if (entry.targetReps !== undefined) singleSet.reps = entry.targetReps;
    if (entry.targetWeight !== undefined) singleSet.weight = entry.targetWeight;
    if (entry.targetSeconds !== undefined) singleSet.seconds = entry.targetSeconds;
    if (entry.targetKm !== undefined) singleSet.km = entry.targetKm;
    return { exerciseId: entry.exerciseId, targetSets: Array.from({ length: count }, () => ({ ...singleSet })) };
  }
  return { exerciseId: entry.exerciseId, targetSets: [] };
}

function emptySetForType(type) {
  if (type === "weight_reps") return { reps: "", weight: "" };
  if (type === "bodyweight" || type === "band") return { reps: "" };
  if (type === "duration") return { seconds: "" };
  if (type === "distance") return { km: "" };
  return {};
}

function ProgramBuilder({ onSave, onCancel }) {
  const [name, setName] = useState("");
  const [days, setDays] = useState([{ label: "", muscles: [], exercises: [] }]);
  const [daySearch, setDaySearch] = useState({});
  const [error, setError] = useState("");

  function updateDayLabel(idx, label) {
    setDays((prev) => prev.map((d, i) => (i === idx ? { ...d, label } : d)));
  }

  function toggleDayMuscle(idx, muscleId) {
    setDays((prev) =>
      prev.map((d, i) => {
        if (i !== idx) return d;
        const has = d.muscles.includes(muscleId);
        return { ...d, muscles: has ? d.muscles.filter((m) => m !== muscleId) : [...d.muscles, muscleId] };
      })
    );
  }

  function addDayExercise(idx, exerciseId) {
    setDays((prev) => prev.map((d, i) => (i === idx ? { ...d, exercises: [...(d.exercises || []), { exerciseId, targetSets: [] }] } : d)));
  }

  function removeDayExercise(idx, exerciseId) {
    setDays((prev) => prev.map((d, i) => (i === idx ? { ...d, exercises: (d.exercises || []).filter((e) => e.exerciseId !== exerciseId) } : d)));
  }

  function addDayExerciseSet(idx, exerciseId, newSet) {
    setDays((prev) =>
      prev.map((d, i) => {
        if (i !== idx) return d;
        return {
          ...d,
          exercises: (d.exercises || []).map((e) => (e.exerciseId === exerciseId ? { ...e, targetSets: [...(e.targetSets || []), newSet] } : e)),
        };
      })
    );
  }

  function updateDayExerciseSet(idx, exerciseId, setIdx, field, value) {
    setDays((prev) =>
      prev.map((d, i) => {
        if (i !== idx) return d;
        return {
          ...d,
          exercises: (d.exercises || []).map((e) =>
            e.exerciseId === exerciseId ? { ...e, targetSets: e.targetSets.map((s, si) => (si === setIdx ? { ...s, [field]: value } : s)) } : e
          ),
        };
      })
    );
  }

  function removeDayExerciseSet(idx, exerciseId, setIdx) {
    setDays((prev) =>
      prev.map((d, i) => {
        if (i !== idx) return d;
        return {
          ...d,
          exercises: (d.exercises || []).map((e) => (e.exerciseId === exerciseId ? { ...e, targetSets: e.targetSets.filter((_, si) => si !== setIdx) } : e)),
        };
      })
    );
  }

  function addDay() {
    setDays((prev) => [...prev, { label: "", muscles: [], exercises: [] }]);
  }

  function removeDay(idx) {
    setDays((prev) => prev.filter((_, i) => i !== idx));
  }

  function handleSave() {
    if (!name.trim()) {
      setError("Donne un nom à ton programme avant d'enregistrer.");
      return;
    }
    const incompleteDays = days.filter((d) => !d.label.trim() || d.muscles.length === 0);
    if (incompleteDays.length > 0) {
      setError("Chaque jour doit avoir un nom ET au moins un muscle sélectionné (touche les étiquettes grises sous le nom du jour).");
      return;
    }
    setError("");
    const cleanedDays = days.map((d) => ({
      ...d,
      exercises: (d.exercises || []).map((e) => ({
        exerciseId: e.exerciseId,
        targetSets: (e.targetSets || [])
          .map((s) => {
            const clean = {};
            if (s.reps !== undefined && s.reps !== "") clean.reps = parseInt(s.reps, 10);
            if (s.weight !== undefined && s.weight !== "") clean.weight = parseFloat(s.weight);
            if (s.seconds !== undefined && s.seconds !== "") clean.seconds = parseInt(s.seconds, 10);
            if (s.km !== undefined && s.km !== "") clean.km = parseFloat(s.km);
            return clean;
          })
          .filter((s) => Object.keys(s).length > 0),
      })),
    }));
    onSave({ id: `custom-${Date.now()}`, name: name.trim(), days: cleanedDays });
  }

  return (
    <div className="card program-builder">
      <div className="card-label">Nouveau programme</div>
      <input className="picker-search" type="text" placeholder="Nom du programme (ex: Ma routine 4 jours)" value={name} onChange={(e) => setName(e.target.value)} />

      {days.map((day, idx) => {
        const dayIncomplete = error && (!day.label.trim() || day.muscles.length === 0);
        const dayExercises = day.exercises || [];
        const search = daySearch[idx] || "";
        const options = day.muscles.length === 0
          ? []
          : EXERCISES.filter(
              (ex) => day.muscles.includes(ex.muscle) && !dayExercises.some((e) => e.exerciseId === ex.id) && (!search || ex.name.toLowerCase().includes(search.toLowerCase()))
            );
        return (
          <div key={idx} className={`program-day-builder ${dayIncomplete ? "program-day-builder-error" : ""}`}>
            <div className="program-day-builder-head">
              <input type="text" placeholder={`Jour ${idx + 1} (ex: Push)`} value={day.label} onChange={(e) => updateDayLabel(idx, e.target.value)} />
              {days.length > 1 && (
                <button className="icon-btn" onClick={() => removeDay(idx)}>
                  <X size={14} />
                </button>
              )}
            </div>
            <div className="chip-row">
              {MUSCLES.map((m) => (
                <button key={m.id} className={`chip ${day.muscles.includes(m.id) ? "chip-active" : ""}`} onClick={() => toggleDayMuscle(idx, m.id)}>
                  {m.label}
                </button>
              ))}
            </div>
            {day.muscles.length === 0 && <p className="hint-text program-day-hint">Touche au moins un muscle pour ce jour.</p>}

            {day.muscles.length > 0 && (
              <div className="day-exercise-picker">
                <div className="picker-title">Exercices de ce jour (optionnel) — ajoute chaque série individuellement</div>
                {dayExercises.length > 0 && (
                  <div className="day-exercise-list">
                    {dayExercises.map((entry) => (
                      <DayExerciseRow
                        key={entry.exerciseId}
                        entry={entry}
                        onAddSet={(newSet) => addDayExerciseSet(idx, entry.exerciseId, newSet)}
                        onUpdateSet={(setIdx, field, value) => updateDayExerciseSet(idx, entry.exerciseId, setIdx, field, value)}
                        onRemoveSet={(setIdx) => removeDayExerciseSet(idx, entry.exerciseId, setIdx)}
                        onRemoveExercise={() => removeDayExercise(idx, entry.exerciseId)}
                      />
                    ))}
                  </div>
                )}
                <input
                  type="text"
                  className="picker-search day-exercise-search"
                  placeholder="Rechercher un exercice à ajouter..."
                  value={search}
                  onChange={(e) => setDaySearch((prev) => ({ ...prev, [idx]: e.target.value }))}
                />
                <div className="exercise-list day-exercise-options">
                  {options.length === 0 && <p className="hint-text">Aucun exercice trouvé pour ces muscles.</p>}
                  {options.map((ex) => (
                    <button key={ex.id} className="exercise-item" onClick={() => addDayExercise(idx, ex.id)}>
                      <span>{ex.name}</span>
                      <Plus size={14} />
                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>
        );
      })}

      <button className="btn-ghost" onClick={addDay}>
        <Plus size={14} /> Ajouter un jour
      </button>

      {error && <p className="form-error">{error}</p>}

      <div className="session-actions">
        <button className="btn-primary" onClick={handleSave}>
          Enregistrer
        </button>
        <button className="btn-ghost" onClick={onCancel}>
          Annuler
        </button>
      </div>
    </div>
  );
}

function ProgramTab({ state, onSelectProgram, onClearProgram, onAddCustomProgram, onDeleteCustomProgram, onStartProgramSession }) {
  const [showBuilder, setShowBuilder] = useState(false);
  const active = getAllPrograms(state.customPrograms).find((p) => p.id === state.programs.activeProgramId) || null;
  const activeDay = active ? active.days[state.programs.currentDayIndex % active.days.length] : null;

  return (
    <div className="tab-content">
      <h2 className="tab-title">Programmes</h2>
      <p className="hint-text">
        Choisis une routine (Upper/Lower, Push/Pull/Legs...) ou crée la tienne avec autant de jours que tu veux. Une fois le dernier jour terminé, le
        programme revient automatiquement au jour 1.
      </p>

      {active && activeDay ? (
        <div className="card program-active-card">
          <div className="card-row">
            <div className="card-label" style={{ marginBottom: 0 }}>
              Programme actif — {active.name}
            </div>
            <button className="icon-btn" onClick={onClearProgram}>
              <X size={16} />
            </button>
          </div>
          <div className="program-day-highlight">
            <div className="program-day-index">
              Jour {(state.programs.currentDayIndex % active.days.length) + 1} / {active.days.length}
              {state.programs.completedCycles > 0 ? ` — Cycle ${state.programs.completedCycles + 1}` : ""}
            </div>
            <div className="program-day-label">{activeDay.label}</div>
            <div className="program-day-muscles">
              {activeDay.muscles.map((mId) => (
                <span key={mId} className="muscle-tag">
                  {MUSCLES.find((m) => m.id === mId)?.label}
                </span>
              ))}
            </div>
            <ProgramDayExercises day={activeDay} />
          </div>
          <button className="btn-primary" onClick={onStartProgramSession}>
            <Dumbbell size={16} /> Démarrer la séance du jour
          </button>
        </div>
      ) : (
        <p className="hint-text">Aucun programme actif pour le moment — choisis-en un ci-dessous.</p>
      )}

      <div className="card">
        <div className="card-label">Programmes prédéfinis</div>
        <div className="program-list">
          {PRESET_PROGRAMS.map((p) => (
            <button key={p.id} className={`program-card ${state.programs.activeProgramId === p.id ? "program-active" : ""}`} onClick={() => onSelectProgram(p.id)}>
              <span className="program-name">{p.name}</span>
              <span className="program-days-count">
                {p.days.length} jour{p.days.length > 1 ? "s" : ""}
              </span>
            </button>
          ))}
        </div>
      </div>

      {state.customPrograms.length > 0 && (
        <div className="card">
          <div className="card-label">Mes programmes</div>
          <div className="program-list">
            {state.customPrograms.map((p) => (
              <div key={p.id} className="program-card-row">
                <button className={`program-card ${state.programs.activeProgramId === p.id ? "program-active" : ""}`} onClick={() => onSelectProgram(p.id)}>
                  <span className="program-name">{p.name}</span>
                  <span className="program-days-count">
                    {p.days.length} jour{p.days.length > 1 ? "s" : ""}
                  </span>
                </button>
                <button className="icon-btn" onClick={() => onDeleteCustomProgram(p.id)}>
                  <X size={16} />
                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      {!showBuilder ? (
        <button className="btn-secondary" onClick={() => setShowBuilder(true)}>
          <Plus size={16} /> Créer un programme personnalisé
        </button>
      ) : (
        <ProgramBuilder
          onSave={(program) => {
            onAddCustomProgram(program);
            setShowBuilder(false);
          }}
          onCancel={() => setShowBuilder(false)}
        />
      )}
    </div>
  );
}

    { id: "muscles", icon: Activity, label: "Muscles" },

      })}

function SessionSummaryModal({ summary, onClose }) {
  return (
    <div className="modal-overlay">
      <div className="modal-card">
        <div className="modal-title">Séance terminée</div>
        <div className="modal-xp">+{summary.xp} XP</div>
        {summary.leveledUp && <div className="modal-levelup">NIVEAU {summary.newLevel} ATTEINT !</div>}
        {summary.programCompleted && (
          <div className="modal-levelup modal-program-complete">
            PROGRAMME "{summary.programCompleted.toUpperCase()}" TERMINÉ !<br />

              <div key={i} className="modal-row">
                {r.muscle} → {r.rank}

            ))}

/* ---------------- APP ---------------- */

function App() {
  const [loaded, setLoaded] = useState(false);
  const [state, setState] = useState(defaultState());
  const [activeTab, setActiveTab] = useState("dashboard");
  const [sessionActive, setSessionActive] = useState(false);
  const [sessionExercises, setSessionExercises] = useState([]);
  const [sessionIsFromProgram, setSessionIsFromProgram] = useState(false);
  const [summary, setSummary] = useState(null);
  const [trainSearch, setTrainSearch] = useState("");
  const [trainMuscleFilter, setTrainMuscleFilter] = useState("all");
  const [showResetConfirm, setShowResetConfirm] = useState(false);

  useEffect(() => {
    let mounted = true;
    (async () => {
      try {
        const res = await window.storage.get("gymlevels-data", false);
        if (mounted && res && res.value) {
          const parsed = JSON.parse(res.value);
          setState((prev) => ({
            ...defaultState(),
            ...parsed,
            muscleXp: { ...defaultState().muscleXp, ...(parsed.muscleXp || {}) },
          }));
        }
      } catch (err) {
        /* no existing data yet */
      } finally {
        if (mounted) setLoaded(true);
      }
    })();
    return () => {
      mounted = false;
    };
  }, []);

  useEffect(() => {
    if (!loaded) return;
    (async () => {
      try {
        await window.storage.set("gymlevels-data", JSON.stringify(state), false);
      } catch (err) {
        /* ignore save errors */
      }
    })();
  }, [state, loaded]);

  function handleSelectClass(classId) {
    setState((prev) => ({ ...prev, classId }));
  }

  function handleStartSession() {
    setSessionIsFromProgram(false);
    setSessionActive(true);
    setActiveTab("train");
  }

  function handleSuggestMuscle(muscleId) {
    setTrainMuscleFilter(muscleId);
    setSessionIsFromProgram(false);
    setSessionActive(true);
    setActiveTab("train");
  }

  function handleSelectProgram(programId) {
    setState((prev) => ({ ...prev, programs: { activeProgramId: programId, currentDayIndex: 0, completedCycles: 0 } }));
  }

  function handleClearProgram() {
    setState((prev) => ({ ...prev, programs: { activeProgramId: null, currentDayIndex: 0, completedCycles: 0 } }));
  }

  function handleAddCustomProgram(program) {
    setState((prev) => ({ ...prev, customPrograms: [...prev.customPrograms, program] }));
  }

  function handleDeleteCustomProgram(programId) {
    setState((prev) => ({
      ...prev,
      customPrograms: prev.customPrograms.filter((p) => p.id !== programId),
      programs: prev.programs.activeProgramId === programId ? { activeProgramId: null, currentDayIndex: 0, completedCycles: 0 } : prev.programs,
    }));
  }

  function handleStartProgramSession() {
    const active = getAllPrograms(state.customPrograms).find((p) => p.id === state.programs.activeProgramId);
    let hasPredefinedExercises = false;
    if (active) {
      const day = active.days[state.programs.currentDayIndex % active.days.length];
      setTrainMuscleFilter(day.muscles[0] || "all");
      if (day.exercises && day.exercises.length > 0) {
        hasPredefinedExercises = true;
        setSessionExercises(
          day.exercises.map((rawEntry) => {
            const entry = normalizeExerciseEntry(rawEntry);
            const ex = EXERCISES.find((e) => e.id === entry.exerciseId);
            const sets = ex
              ? (entry.targetSets || [])
                  .filter((s) => isCompleteTargetSet(ex.type, s))
                  .map((s) => ({ ...s }))
              : [];
            return { exerciseId: entry.exerciseId, sets };
          })
        );
      }
    }
    setSessionIsFromProgram(hasPredefinedExercises);
    setSessionActive(true);
    setActiveTab("train");
  }

  function handleAddExercise(exerciseId) {
    setSessionExercises((prev) => (prev.some((e) => e.exerciseId === exerciseId) ? prev : [...prev, { exerciseId, sets: [] }]));
  }

  function handleAddSet(exerciseId, setData) {
    setSessionExercises((prev) => prev.map((e) => (e.exerciseId === exerciseId ? { ...e, sets: [...e.sets, setData] } : e)));
  }

  function handleRemoveSet(exerciseId, idx) {
    setSessionExercises((prev) => prev.map((e) => (e.exerciseId === exerciseId ? { ...e, sets: e.sets.filter((_, i) => i !== idx) } : e)));
  }

  function handleRemoveExercise(exerciseId) {
    setSessionExercises((prev) => prev.filter((e) => e.exerciseId !== exerciseId));
  }

  function handleCancelSession() {
    setSessionActive(false);
    setSessionExercises([]);
    setSessionIsFromProgram(false);
  }

  function handleFinishSession() {
    const hasSets = sessionExercises.some((e) => e.sets.length > 0);
    if (!hasSets) {
      setSessionActive(false);
      setSessionExercises([]);
      setSessionIsFromProgram(false);
      return;
    }

    const newMuscleXp = { ...state.muscleXp };
    const newPrs = { ...state.prs };
    let totalSessionXp = 0;
    let newVolume = 0;
    const newPRsList = [];
    const musclesTrained = new Set();

    sessionExercises.forEach((entry) => {
      const ex = EXERCISES.find((e) => e.id === entry.exerciseId);
      if (!ex || entry.sets.length === 0) return;
      musclesTrained.add(ex.muscle);
      entry.sets.forEach((setData) => {
        const xp = computeSetXp(ex.type, setData);
        totalSessionXp += xp;
        newMuscleXp[ex.muscle] = (newMuscleXp[ex.muscle] || 0) + xp;
        if (ex.type === "weight_reps") newVolume += setData.weight * setData.reps;
        const score = computeSetScore(ex.type, setData);
        if (!newPrs[ex.id] || score > newPrs[ex.id]) {
          newPrs[ex.id] = score;
          if (!newPRsList.includes(ex.name)) newPRsList.push(ex.name);
        }
      });
    });

    const prevLevel = getLevelInfo(state.totalXp).level;
    const newTotalXp = state.totalXp + totalSessionXp;
    const newLevel = getLevelInfo(newTotalXp).level;

    const rankUps = [];
    musclesTrained.forEach((mId) => {
      const before = getMuscleRankInfo(state.muscleXp[mId] || 0);
      const after = getMuscleRankInfo(newMuscleXp[mId]);
      if (after.idx > before.idx) {
        rankUps.push({ muscle: MUSCLES.find((m) => m.id === mId)?.label || mId, rank: getRankLabel(after) });
      }
    });

    const newStreak = updateStreak(state.streak);

    const session = {
      id: Date.now(),
      date: new Date().toISOString(),
      muscles: Array.from(musclesTrained),
      xp: totalSessionXp,
      volume: newVolume,
    };

    const activeProgramForSession = getAllPrograms(state.customPrograms).find((p) => p.id === state.programs.activeProgramId);
    const wasLastDay = activeProgramForSession ? state.programs.currentDayIndex === activeProgramForSession.days.length - 1 : false;
    const newPrograms = activeProgramForSession
      ? {
          activeProgramId: state.programs.activeProgramId,
          currentDayIndex: (state.programs.currentDayIndex + 1) % activeProgramForSession.days.length,
          completedCycles: wasLastDay ? (state.programs.completedCycles || 0) + 1 : state.programs.completedCycles || 0,
        }
      : state.programs;

    setState((prev) => ({
      ...prev,
      totalXp: newTotalXp,
      totalVolume: prev.totalVolume + newVolume,
      muscleXp: newMuscleXp,
      prs: newPrs,
      streak: newStreak,
      workoutLog: [...prev.workoutLog, session],
      programs: newPrograms,
    }));

    setSummary({
      xp: totalSessionXp,
      leveledUp: newLevel > prevLevel,
      newLevel,
      rankUps,
      prs: newPRsList,
      programCompleted: wasLastDay && activeProgramForSession ? activeProgramForSession.name : null,
      cycleCount: newPrograms.completedCycles,
    });
    setSessionActive(false);
    setSessionExercises([]);
    setSessionIsFromProgram(false);
  }

  function handleLogWeight(weight) {
    const today = localDateKey();
    setState((prev) => {
      const filtered = prev.weightHistory.filter((w) => w.date !== today);
      return { ...prev, weightHistory: [...filtered, { date: today, weight }].sort((a, b) => a.date.localeCompare(b.date)) };
    });
  }

  function handleSetGoal(goal) {
    setState((prev) => ({ ...prev, goalWeight: goal }));
  }

  function handleReset() {
    setShowResetConfirm(true);
  }

  function confirmReset() {
    setState(defaultState());
    setSessionActive(false);
    setSessionExercises([]);
    setSessionIsFromProgram(false);
    setActiveTab("dashboard");
    setShowResetConfirm(false);
  }

  function cancelReset() {
    setShowResetConfirm(false);
  }

  const lastSession = state.workoutLog.length > 0 ? state.workoutLog[state.workoutLog.length - 1] : null;
  const activeProgram = getAllPrograms(state.customPrograms).find((p) => p.id === state.programs.activeProgramId) || null;
  const activeProgramDay = activeProgram ? activeProgram.days[state.programs.currentDayIndex % activeProgram.days.length] : null;

  return (
    <div className="app-shell">
      <style>{APP_CSS}</style>
      {!loaded ? (
        <div className="loading-screen">Chargement...</div>
      ) : !state.classId ? (
        <Onboarding onSelect={handleSelectClass} />
      ) : (
        <>
          <TopHUD state={state} />
          <main className="app-main">
            {activeTab === "dashboard" && (
              <Dashboard
                state={state}
                activeProgram={activeProgram}
                activeProgramDay={activeProgramDay}
                onStartProgramSession={handleStartProgramSession}
              />
            )}
            {activeTab === "train" && (
              <TrainTab
                sessionActive={sessionActive}
                sessionExercises={sessionExercises}
                sessionIsFromProgram={sessionIsFromProgram}
                onStartSession={handleStartSession}
                onAddExercise={handleAddExercise}
                onAddSet={handleAddSet}
                onRemoveSet={handleRemoveSet}
                onRemoveExercise={handleRemoveExercise}
                onFinishSession={handleFinishSession}
                onCancelSession={handleCancelSession}
                search={trainSearch}
                setSearch={setTrainSearch}
                muscleFilter={trainMuscleFilter}
                setMuscleFilter={setTrainMuscleFilter}
                lastSession={lastSession}
                activeProgram={activeProgram}
                activeProgramDay={activeProgramDay}
                onStartProgramSession={handleStartProgramSession}
              />
            )}
            {activeTab === "program" && (
              <ProgramTab
                state={state}
                onSelectProgram={handleSelectProgram}
                onClearProgram={handleClearProgram}
                onAddCustomProgram={handleAddCustomProgram}
                onDeleteCustomProgram={handleDeleteCustomProgram}
                onStartProgramSession={handleStartProgramSession}
              />
            )}
            {activeTab === "muscles" && <MusclesTab state={state} onSuggestMuscle={handleSuggestMuscle} />}
            {activeTab === "progress" && <ProgressTab state={state} onLogWeight={handleLogWeight} onSetGoal={handleSetGoal} />}
            {activeTab === "profile" && <ProfileTab state={state} onChangeClass={handleSelectClass} onReset={handleReset} />}
          </main>
          <BottomNav active={activeTab} onChange={setActiveTab} />
          {summary && <SessionSummaryModal summary={summary} onClose={() => setSummary(null)} />}
          {showResetConfirm && (
            <div className="modal-overlay">
              <div className="modal-card">
                <div className="modal-title">Réinitialiser ?</div>
                <p className="hint-text">
                  Niveau, XP, rangs musculaires, séances, records et poids seront effacés définitivement.
                </p>
                <div className="session-actions">
                  <button className="btn-danger" onClick={confirmReset}>
                    Oui, tout effacer
                  </button>
                  <button className="btn-ghost" onClick={cancelReset}>
                    Annuler
                  </button>
                </div>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

<script>
  // On retire volontairement le service worker pour l'instant : il gardait en cache
  // une ancienne version cassée de la page. On nettoie tout ce qui a pu être installé.
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.getRegistrations().then(function (regs) {
      regs.forEach(function (reg) {
        reg.unregister();
      });
    });
  }
  if (window.caches && caches.keys) {
    caches.keys().then(function (keys) {
      keys.forEach(function (key) {
        caches.delete(key);
      });
    });
  }
</script>

      "https://unpkg.com/@babel/standalone@7.26.4/babel.min.js",
      "https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.4/babel.min.js",
      "https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"
    ] }
  ];

  var loadingEl = document.getElementById("boot-loading");
  var errorEl = document.getElementById("boot-error");
  var msgEl = document.getElementById("boot-error-msg");
  var retryEl = document.getElementById("boot-retry");
  var rootEl = document.getElementById("root");
  var booted = false;

  if (retryEl) {
    retryEl.addEventListener("click", function () { window.location.reload(); });
  }

  function setStatus(txt) {
    if (loadingEl) loadingEl.textContent = txt;
  }

  function fail(detail) {
    if (booted) return;
    if (loadingEl) loadingEl.style.display = "none";
    if (rootEl) rootEl.style.display = "none";
    if (errorEl) errorEl.style.display = "block";
    if (msgEl && detail) {
      msgEl.textContent = "Detail technique : " + detail;
    }
  }

  // Ne masque l'application QUE si l'echec survient avant l'affichage.
  window.addEventListener("error", function (e) {
    fail(e && e.message ? e.message : "erreur inconnue");
  });
  window.addEventListener("unhandledrejection", function (e) {
    var r = e && e.reason;
    fail(r && r.message ? r.message : "promesse rejetee");
  });

  function loadScript(url) {
    return new Promise(function (resolve, reject) {
      var el = document.createElement("script");
      var settled = false;
      var timer = setTimeout(function () {
        if (settled) return;
        settled = true;
        if (el.parentNode) el.parentNode.removeChild(el);
        reject(new Error("delai depasse : " + url));
      }, 20000);
      el.src = url;
      el.async = false;
      el.crossOrigin = "anonymous";
      el.onload = function () {
        if (settled) return;
        settled = true;
        clearTimeout(timer);
        resolve();
      };
      el.onerror = function () {
        if (settled) return;
        settled = true;
        clearTimeout(timer);
        if (el.parentNode) el.parentNode.removeChild(el);
        reject(new Error("CDN injoignable : " + url));
      };
      document.head.appendChild(el);
    });
  }

  function loadLib(lib) {
    var i = 0;
    var lastErr = null;
    function attempt() {
      if (window[lib.global]) return Promise.resolve();
      if (i >= lib.urls.length) {
        return Promise.reject(new Error(
          lib.global + " n'a pu etre charge depuis aucun CDN" +
          (lastErr ? " (" + lastErr.message + ")" : "")
        ));
      }
      var url = lib.urls[i++];
      return loadScript(url)
        .then(function () {
          if (!window[lib.global]) {
            throw new Error(lib.global + " non defini apres " + url);
          }
        })
        .catch(function (err) {
          lastErr = err;
          return attempt();
        });
    }
    return attempt();
  }

  function boot() {
    var chain = Promise.resolve();
    LIBS.forEach(function (lib) {
      chain = chain.then(function () {
        setStatus("Chargement de " + lib.global + "\u2026");
        return loadLib(lib);
      });
    });

    chain
      .then(function () {
        setStatus("Preparation de l'application\u2026");
        var srcEl = document.getElementById("app-source");
        if (!srcEl) throw new Error("code source introuvable (#app-source)");

        var compiled = window.Babel.transform(srcEl.textContent, {
          // runtime "classic" = React.createElement, indispensable avec les
          // builds UMD charges en global. Sans ce reglage explicite, un futur
          // Babel 8 basculerait sur le runtime "automatic" (qui emet des
          // import ...) et l'application ne demarrerait plus du tout.
          presets: [["react", { runtime: "classic" }]],
          filename: "app.jsx"
        }).code;

        var runner = document.createElement("script");
        runner.textContent = compiled;
        document.body.appendChild(runner);

        // Verifie que React a bien rendu quelque chose. createRoot().render()
        // etant asynchrone, on laisse un court delai avant de conclure.
        setTimeout(function () {
          if (rootEl && rootEl.querySelector(".app-shell")) {
            booted = true;
            if (loadingEl && loadingEl.parentNode) {
              loadingEl.parentNode.removeChild(loadingEl);
            }
          } else {
            fail("l'application ne s'est pas affichee (erreur de rendu)");
          }
        }, 1500);
      })
      .catch(function (err) {
        fail(err && err.message ? err.message : String(err));
      });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot);
  } else {
    boot();
  }
})();
</script>
</body>
</html>
